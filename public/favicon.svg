<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cremiger Papier-Hintergrund -->
  <rect width="64" height="64" fill="#f3ede1"/>

  <!-- Doppelter Stempel-Rahmen, leicht schief wie ein echter Stempel -->
  <g transform="rotate(-2 32 32)">
    <rect x="6" y="6" width="52" height="52" fill="none" stroke="#1a1612" stroke-width="2.5"/>
    <rect x="10" y="10" width="44" height="44" fill="none" stroke="#1a1612" stroke-width="0.8"/>
  </g>

  <!-- Großes serifes E in der Display-Schrift, rot wie der Akzent -->
  <text x="32" y="49"
        font-family="Playfair Display, Times New Roman, Georgia, serif"
        font-size="44"
        font-weight="800"
        font-style="italic"
        fill="#7a1f1f"
        text-anchor="middle">E</text>
</svg>
